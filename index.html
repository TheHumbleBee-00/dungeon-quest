<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>☠ DUNGEON QUEST — Pixel Roguelike</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #05050a;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 200; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
    );
  }
  /* CRT vignette */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 201; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.85) 100%);
  }
  #wrap {
    position: relative;
    box-shadow: 0 0 60px rgba(80,250,123,0.07), 0 0 120px rgba(80,250,123,0.03);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    border: 2px solid #1a1a2e;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
// ═══════════════════════════════════════════════
//  DUNGEON QUEST  ☠  Pixel Roguelike
//  Single-file HTML5 Canvas Game
// ═══════════════════════════════════════════════

const TILE   = 32;
const MAP_W  = 22;
const MAP_H  = 16;
const SB_W   = 224;  // sidebar
const CW     = MAP_W * TILE + SB_W;   // 704 + 224 = 928
const CH     = MAP_H * TILE;          // 512

const c  = document.getElementById('c');
c.width  = CW;
c.height = CH;
const ctx = c.getContext('2d');

// Scale canvas to fit window
function resize() {
  const scale = Math.min(
    window.innerWidth  / CW,
    window.innerHeight / CH,
    1.5
  );
  c.style.width  = Math.floor(CW * scale) + 'px';
  c.style.height = Math.floor(CH * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── TILE TYPES ──
const T_WALL = 0, T_FLOOR = 1, T_STAIRS = 2;
const GSTATE = { TITLE:'title', PLAY:'play', DEAD:'dead', WIN:'win' };

// ── AUDIO ──
let actx = null;
function bootAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(freq, dur, type='square', vol=0.08, delay=0) {
  if (!actx) return;
  try {
    const t = actx.currentTime + delay;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}
const SFX = {
  step:   () => beep(60, 0.04, 'square', 0.04),
  atk:    () => { beep(220, 0.06,'square',0.09); beep(160, 0.06,'square',0.07,0.05); },
  hurt:   () => { beep(110, 0.18,'sawtooth',0.14); beep(80, 0.18,'sawtooth',0.1,0.05); },
  pick:   () => [440,660,880].forEach((f,i) => beep(f,0.1,'square',0.07,i*0.07)),
  stairs: () => [330,440,550,770].forEach((f,i) => beep(f,0.12,'square',0.09,i*0.09)),
  die:    () => [300,240,180,120,80].forEach((f,i) => beep(f,0.16,'sawtooth',0.12,i*0.1)),
  lvlup:  () => [330,440,550,660,880,1100].forEach((f,i) => beep(f,0.13,'square',0.09,i*0.07)),
  start:  () => [220,330,440,660].forEach((f,i) => beep(f,0.15,'square',0.1,i*0.1)),
  win:    () => [440,550,660,880,1100,880,660,550,440].forEach((f,i) => beep(f,0.18,'square',0.1,i*0.12)),
};

// ── ENEMY DEFINITIONS ──
const EDEFS = [
  { id:'slime',    n:'Slime',    hp:8,  atk:3,  def:0, col:'#50fa7b', xp:5,  g:[1,3] },
  { id:'bat',      n:'Bat',      hp:6,  atk:4,  def:0, col:'#8be9fd', xp:7,  g:[1,3] },
  { id:'skeleton', n:'Skeleton', hp:15, atk:5,  def:2, col:'#dde',    xp:12, g:[2,5] },
  { id:'goblin',   n:'Goblin',   hp:13, atk:6,  def:1, col:'#98c379', xp:14, g:[2,6] },
  { id:'demon',    n:'Demon',    hp:24, atk:9,  def:3, col:'#ff5555', xp:22, g:[4,10] },
  { id:'dragon',   n:'Dragon',   hp:45, atk:14, def:5, col:'#ff8c00', xp:60, g:[10,22] },
];

// ── ITEM DEFINITIONS ──
const IDEFS = {
  potion: { n:'Potion', col:'#ff79c6', desc:'+15 HP'   },
  sword:  { n:'Sword',  col:'#b0b0ff', desc:'+3 ATK'   },
  shield: { n:'Shield', col:'#ffd700', desc:'+2 DEF'   },
  gold:   { n:'Gold',   col:'#ffd700', desc:'Score!'   },
};

// ── GLOBAL STATE ──
let gs, player, dungeon, enemies, items, parts, msgs, turn, shake, floor, hi, timer, blink;

function initGlobal() {
  hi    = +localStorage.getItem('dq_hi') || 0;
  gs    = GSTATE.TITLE;
  timer = 0; blink = 0; parts = []; msgs = [];
}

// ── NEW GAME ──
function newGame() {
  floor  = 1;
  turn   = 0;
  shake  = 0;
  parts  = [];
  msgs   = [];
  player = { x:2,y:2, hp:30,maxHp:30, atk:5,def:2, gold:0, exp:0, lv:1, xpN:20, face:1 };
  makeFloor();
  gs = GSTATE.PLAY;
  SFX.start();
  log('Welcome! Find the ▼ stairs.', 'sys');
}

// ── DUNGEON GENERATION ──
function makeFloor() {
  dungeon = Array.from({length:MAP_H}, () => new Uint8Array(MAP_W));
  enemies = []; items = [];

  const rooms = [];
  for (let attempt=0; attempt<80; attempt++) {
    const w = ri(3,7), h = ri(3,6);
    const x = ri(1, MAP_W-w-2), y = ri(1, MAP_H-h-2);
    let ok = true;
    for (const r of rooms) {
      if (x < r.x+r.w+1 && x+w+1 > r.x && y < r.y+r.h+1 && y+h+1 > r.y) { ok=false; break; }
    }
    if (ok) {
      for (let ry=y; ry<y+h; ry++)
        for (let rx=x; rx<x+w; rx++)
          dungeon[ry][rx] = T_FLOOR;
      rooms.push({ x,y,w,h, cx:x+Math.floor(w/2), cy:y+Math.floor(h/2) });
      if (rooms.length >= 10) break;
    }
  }
  if (rooms.length < 2) { makeFloor(); return; }

  // Connect rooms with corridors
  for (let i=1; i<rooms.length; i++) {
    const a=rooms[i-1], b=rooms[i];
    if (Math.random()<0.5) { hCor(a.cx,b.cx,a.cy); vCor(a.cy,b.cy,b.cx); }
    else                    { vCor(a.cy,b.cy,a.cx); hCor(a.cx,b.cx,b.cy); }
  }

  // Place player in first room
  player.x = rooms[0].cx; player.y = rooms[0].cy;

  // Place stairs in last room
  const lr = rooms[rooms.length-1];
  dungeon[lr.cy][lr.cx] = T_STAIRS;

  // Enemies & items in rooms 1..n
  const etypes = floorEnemies();
  for (let i=1; i<rooms.length; i++) {
    const room = rooms[i];
    for (let e=0; e < ri(1, Math.min(3, 1+Math.floor(floor/2))); e++) {
      const pos = freePosInRoom(room);
      if (pos) spawnEnemy(pos.x, pos.y, etypes[ri(0,etypes.length-1)]);
    }
    if (Math.random()<0.55) {
      const pos = freePosInRoom(room);
      if (pos) spawnItem(pos.x, pos.y);
    }
  }
}

function hCor(x1,x2,y){ const [a,b]=x1<x2?[x1,x2]:[x2,x1]; for(let x=a;x<=b;x++) if(inB(x,y)) dungeon[y][x]=T_FLOOR; }
function vCor(y1,y2,x){ const [a,b]=y1<y2?[y1,y2]:[y2,y1]; for(let y=a;y<=b;y++) if(inB(x,y)) dungeon[y][x]=T_FLOOR; }

function floorEnemies() {
  if (floor===1) return [EDEFS[0],EDEFS[1]];
  if (floor===2) return [EDEFS[0],EDEFS[1],EDEFS[2]];
  if (floor===3) return [EDEFS[1],EDEFS[2],EDEFS[3]];
  if (floor===4) return [EDEFS[2],EDEFS[3],EDEFS[4]];
  return [EDEFS[3],EDEFS[4],EDEFS[5]];
}

function spawnEnemy(x,y,def) {
  const m = 1+(floor-1)*0.2;
  enemies.push({
    x,y, id:def.id, n:def.n, col:def.col,
    hp:Math.round(def.hp*m), maxHp:Math.round(def.hp*m),
    atk:Math.round(def.atk*(1+(floor-1)*0.15)),
    def:def.def, xp:def.xp, gr:def.g,
    anim:Math.random()*Math.PI*2,
  });
}

function spawnItem(x,y) {
  const r=Math.random();
  let t = r<0.4?'potion': r<0.65?'gold': r<0.82?'sword':'shield';
  items.push({x,y,t});
}

function freePosInRoom(room) {
  for(let a=0;a<12;a++){
    const x=ri(room.x,room.x+room.w-1), y=ri(room.y,room.y+room.h-1);
    if(dungeon[y][x]===T_FLOOR && !entityAt(x,y)) return {x,y};
  }
  return null;
}

// ── INPUT ──
const keys = {};
document.addEventListener('keydown', e => {
  bootAudio();
  keys[e.key] = true;
  if (gs===GSTATE.TITLE)              { if([' ','Enter'].includes(e.key)) newGame(); return; }
  if ([GSTATE.DEAD,GSTATE.WIN].includes(gs)) { if([' ','Enter'].includes(e.key)) { gs=GSTATE.TITLE; } return; }
  if (gs!==GSTATE.PLAY) return;
  const mv={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
            w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
  const dir=mv[e.key];
  if(dir){ e.preventDefault(); tryMove(dir[0],dir[1]); }
  if(e.key===' '){ e.preventDefault(); endTurn(); log('You rest a moment...','sys'); }
});
document.addEventListener('keyup', e => { delete keys[e.key]; });

function tryMove(dx,dy) {
  const nx=player.x+dx, ny=player.y+dy;
  if(!inB(nx,ny)) return;
  if(dx!==0) player.face=dx;
  const en=enemyAt(nx,ny);
  if(en){ attackEnemy(player,en); endTurn(); return; }
  if(dungeon[ny][nx]!==T_WALL){
    player.x=nx; player.y=ny;
    SFX.step();
    const it=itemAt(nx,ny);
    if(it) collectItem(it);
    if(dungeon[ny][nx]===T_STAIRS) { goDeeper(); return; }
    endTurn();
  }
}

// ── COMBAT ──
function attackEnemy(src,tgt) {
  const dmg=Math.max(1, src.atk - tgt.def + ri(-1,2));
  tgt.hp-=dmg;
  SFX.atk();
  burst(tgt.x, tgt.y, tgt.col, 7);
  log(`You strike the ${tgt.n} for ${dmg} dmg!`, 'dmg');
  if(tgt.hp<=0) killEnemy(tgt);
}

function enemyAttack(en,tgt) {
  const dmg=Math.max(1, en.atk - tgt.def + ri(-1,2));
  tgt.hp-=dmg;
  shake=10;
  SFX.hurt();
  burst(tgt.x, tgt.y, '#ff5555', 10);
  log(`${en.n} hits you for ${dmg} dmg!`, 'dmg');
  if(tgt.hp<=0){ tgt.hp=0; onDeath(); }
}

function killEnemy(en) {
  const g=ri(en.gr[0],en.gr[1]);
  player.gold+=g;
  player.exp+=en.xp;
  log(`${en.n} slain! +${en.xp}XP +${g}G`, 'pick');
  burst(en.x,en.y,'#ffd700',14);
  enemies=enemies.filter(e=>e!==en);
  while(player.exp>=player.xpN){
    player.exp-=player.xpN;
    player.lv++;
    player.xpN=Math.round(player.xpN*1.6);
    player.maxHp+=8; player.hp=Math.min(player.hp+8,player.maxHp);
    player.atk+=2; player.def+=1;
    SFX.lvlup();
    log(`LEVEL UP! Now level ${player.lv}!`, 'sys');
  }
}

function collectItem(it) {
  items=items.filter(i=>i!==it);
  SFX.pick();
  if(it.t==='potion'){ const h=15; player.hp=Math.min(player.hp+h,player.maxHp); log(`Drank potion. +${h} HP!`,'pick'); }
  else if(it.t==='sword'){ player.atk+=3; log('Equipped sword. +3 ATK!','pick'); }
  else if(it.t==='shield'){ player.def+=2; log('Equipped shield. +2 DEF!','pick'); }
  else if(it.t==='gold'){ const g=ri(3,12); player.gold+=g; log(`Collected ${g} gold!`,'pick'); }
}

function goDeeper() {
  SFX.stairs(); floor++;
  if(floor>5){ saveHi(); gs=GSTATE.WIN; SFX.win(); return; }
  makeFloor();
  log(`Descended to floor ${floor}!`, 'sys');
}

function onDeath() { saveHi(); SFX.die(); gs=GSTATE.DEAD; }
function saveHi(){ if(player.gold>hi){ hi=player.gold; localStorage.setItem('dq_hi',hi); } }

function endTurn() {
  for(const en of [...enemies]){
    if(gs!==GSTATE.PLAY) break;
    aiTurn(en);
  }
  turn++;
}

function aiTurn(en) {
  const md=Math.abs(en.x-player.x)+Math.abs(en.y-player.y);
  if(md===1){ enemyAttack(en,player); return; }
  if(md<9){
    const dirs=[[0,-1],[0,1],[-1,0],[1,0]].sort(()=>Math.random()-0.5);
    dirs.sort((a,b)=>{
      const da=Math.abs(en.x+a[0]-player.x)+Math.abs(en.y+a[1]-player.y);
      const db=Math.abs(en.x+b[0]-player.x)+Math.abs(en.y+b[1]-player.y);
      return da-db;
    });
    for(const [dx,dy] of dirs){
      const nx=en.x+dx, ny=en.y+dy;
      if(!inB(nx,ny)||dungeon[ny][nx]===T_WALL||entityAt(nx,ny)) continue;
      en.x=nx; en.y=ny; break;
    }
  } else if(Math.random()<0.25){
    const [dx,dy]=[[0,-1],[0,1],[-1,0],[1,0]][ri(0,3)];
    const nx=en.x+dx,ny=en.y+dy;
    if(inB(nx,ny)&&dungeon[ny][nx]!==T_WALL&&!entityAt(nx,ny)){ en.x=nx; en.y=ny; }
  }
}

// ── PARTICLES ──
function burst(tx,ty,col,n) {
  for(let i=0;i<n;i++) parts.push({
    x:(tx+0.5)*TILE, y:(ty+0.5)*TILE,
    vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5-1,
    life:1, col, sz:ri(2,5)
  });
}

// ── MAIN LOOP ──
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05); last=ts;
  timer+=dt; blink+=dt;
  for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=dt*3; }
  parts=parts.filter(p=>p.life>0);
  for(const en of (enemies||[])) en.anim+=dt*3;
  let sx=0,sy=0;
  if(shake>0){ sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; shake=Math.max(0,shake-1.5); }
  ctx.clearRect(0,0,CW,CH);
  ctx.save(); ctx.translate(sx,sy);
  if(gs===GSTATE.TITLE) drawTitle();
  else { drawMap(); drawSidebar(); if(gs!==GSTATE.PLAY) drawOverlay(); }
  ctx.restore();
  requestAnimationFrame(loop);
}

// ══════════════════════════════════
//  DRAWING
// ══════════════════════════════════

// ── TITLE SCREEN ──
function drawTitle() {
  ctx.fillStyle='#05050a'; ctx.fillRect(0,0,CW,CH);
  // Stars
  for(let i=0;i<120;i++){
    const sx=((Math.sin(i*137.5)*0.5+0.5)*CW+timer*10*(i%3===0?1:-1))%CW;
    const sy=((Math.cos(i*97.3)*0.5+0.5)*CH);
    const sz=(Math.sin(i*3.7+timer)*0.5+0.5)*2+0.5;
    ctx.fillStyle=`rgba(255,255,255,${(Math.sin(i+timer*2)*0.5+0.5)*0.8+0.2})`;
    ctx.fillRect(sx,sy,sz,sz);
  }
  // Title glow
  ctx.shadowColor='#50fa7b'; ctx.shadowBlur=30;
  ctx.fillStyle='#50fa7b';
  ctx.font='10px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillText('— PIXEL ROGUELIKE —', CW/2, CH/2-110);
  ctx.shadowBlur=0;

  // Main title
  const tg=ctx.createLinearGradient(0,CH/2-90,CW,CH/2-40);
  tg.addColorStop(0,'#ff5555'); tg.addColorStop(0.4,'#ffd700');
  tg.addColorStop(0.7,'#ff79c6'); tg.addColorStop(1,'#ff5555');
  ctx.fillStyle=tg;
  ctx.font=`38px "Press Start 2P"`;
  const yb=Math.sin(timer*1.2)*4;
  ctx.fillText('☠ DUNGEON', CW/2, CH/2-65+yb);
  ctx.fillText('QUEST ☠', CW/2, CH/2-15+yb);

  // Orbiting icons
  const icons=['⚔','🛡','💀','🧪','💰','🐉'];
  icons.forEach((ic,i)=>{
    const ang=timer*0.7+(i/icons.length)*Math.PI*2;
    const rx=CW/2+Math.cos(ang)*175, ry=CH/2-38+Math.sin(ang)*70;
    ctx.font='22px serif'; ctx.fillText(ic,rx,ry);
  });

  // Controls
  ctx.fillStyle='#888'; ctx.font='7px "Press Start 2P"';
  ctx.fillText('WASD / ARROWS  ·  move & attack by walking into enemies', CW/2, CH/2+50);
  ctx.fillText('SPACE  ·  wait a turn    ENTER  ·  start', CW/2, CH/2+68);

  // Blink
  if(Math.sin(blink*4)>0){
    ctx.fillStyle='#8be9fd'; ctx.font='12px "Press Start 2P"';
    ctx.fillText('PRESS ENTER TO BEGIN', CW/2, CH/2+100);
  }
  ctx.fillStyle='#ffd700'; ctx.font='8px "Press Start 2P"';
  ctx.fillText(`HIGH SCORE: ${hi} GOLD`, CW/2, CH/2+126);
  ctx.textAlign='left';
}

// ── MAP ──
function drawMap(){
  const t=timer;
  // Background
  ctx.fillStyle='#0c0b12'; ctx.fillRect(0,0,MAP_W*TILE,CH);

  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++){
    const tile=dungeon[y][x];
    const px=x*TILE, py=y*TILE;
    if(tile===T_WALL){
      ctx.fillStyle='#13111e'; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle='#0d0c17';
      for(let l=0;l<TILE;l+=8){ ctx.fillRect(px,py+l,TILE,1); }
      ctx.fillRect(px,py,1,TILE); ctx.fillRect(px+TILE-1,py,1,TILE);
      ctx.fillStyle='#1a1830';
      if((x+y)%3===0) ctx.fillRect(px+4,py+4,4,4);
      if((x*2+y*3)%5===0) ctx.fillRect(px+20,py+20,3,3);
    } else if(tile===T_FLOOR){
      ctx.fillStyle='#100f1a'; ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle='#151322';
      if((x+y)%2===0){ ctx.fillRect(px+2,py+2,2,2); ctx.fillRect(px+20,py+20,2,2); }
      ctx.fillStyle='#0d0c17';
      ctx.fillRect(px,py,TILE,1); ctx.fillRect(px,py,1,TILE);
    } else if(tile===T_STAIRS){
      ctx.fillStyle='#100f1a'; ctx.fillRect(px,py,TILE,TILE);
      const g=Math.sin(t*3)*0.4+0.6;
      ctx.fillStyle='#3a3055'; ctx.globalAlpha=g;
      for(let s=0;s<5;s++) ctx.fillRect(px+5+s*2,py+7+s*3, TILE-12-s*4, 3);
      ctx.globalAlpha=1;
      ctx.fillStyle='#bd93f9'; ctx.font='bold 14px "Press Start 2P"';
      ctx.textAlign='center';
      ctx.shadowColor='#bd93f9'; ctx.shadowBlur=8;
      ctx.fillText('▼',px+TILE/2,py+TILE/2+5);
      ctx.shadowBlur=0; ctx.textAlign='left';
    }
  }

  // Items
  for(const it of items){
    const def=IDEFS[it.t];
    const px=it.x*TILE, py=it.y*TILE;
    const bob=Math.sin(t*2+it.x+it.y)*2.5;
    ctx.fillStyle=def.col; ctx.globalAlpha=0.18;
    ctx.fillRect(px+3,py+3,TILE-6,TILE-6);
    ctx.globalAlpha=1;
    ctx.shadowColor=def.col; ctx.shadowBlur=6;
    ctx.fillStyle=def.col; ctx.font='bold 14px "Press Start 2P"';
    ctx.textAlign='center';
    const ic = it.t==='potion'?'!': it.t==='gold'?'$': it.t==='sword'?'/':')';
    ctx.fillText(ic, px+TILE/2, py+TILE/2+6+bob);
    ctx.shadowBlur=0; ctx.textAlign='left';
  }

  // Enemies
  for(const en of enemies){
    const px=en.x*TILE, py=en.y*TILE;
    const bob=Math.sin(en.anim)*2;
    drawEnemy(en, px, py+bob);
    // HP bar
    const bw=TILE-4, bf=Math.round(bw*en.hp/en.maxHp);
    ctx.fillStyle='#222'; ctx.fillRect(px+2,py-6,bw,4);
    ctx.fillStyle=en.hp>en.maxHp*0.5?'#50fa7b':en.hp>en.maxHp*0.25?'#ffd700':'#ff5555';
    ctx.fillRect(px+2,py-6,bf,4);
  }

  // Player
  drawPlayer(player.x*TILE, player.y*TILE, player.face, Math.sin(t*5));

  // Particles
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  ctx.globalAlpha=1;
}

// ── PIXEL SPRITES ──
function drawPlayer(px,py,face,bob){
  ctx.save();
  if(face<0){ ctx.translate(px+TILE,0); ctx.scale(-1,1); px=0; }
  // Legs
  ctx.fillStyle='#2020a0'; ctx.fillRect(px+9,py+26,5,6); ctx.fillRect(px+18,py+26,5,6);
  // Boots
  ctx.fillStyle='#5c3010'; ctx.fillRect(px+8,py+30,6,3); ctx.fillRect(px+18,py+30,6,3);
  // Cloak back
  ctx.fillStyle='#1a1060'; ctx.fillRect(px+5,py+13,5,14);
  // Body (tunic)
  ctx.fillStyle='#5050c0'; ctx.fillRect(px+9,py+14,14,13);
  // Belt
  ctx.fillStyle='#6b3820'; ctx.fillRect(px+9,py+19,14,2);
  ctx.fillStyle='#c08030'; ctx.fillRect(px+14,py+19,4,2);
  // Chest highlight
  ctx.fillStyle='#6060d0'; ctx.fillRect(px+10,py+14,12,3);
  // Shield arm
  ctx.fillStyle='#f0c090'; ctx.fillRect(px+6,py+14,3,9);
  // Shield
  ctx.fillStyle='#8b2010'; ctx.fillRect(px+1,py+12,7,11);
  ctx.fillStyle='#c03318'; ctx.fillRect(px+2,py+13,5,9);
  ctx.fillStyle='#ffd700'; ctx.fillRect(px+3,py+15,3,5); ctx.fillRect(px+2,py+16,5,3);
  // Sword arm
  ctx.fillStyle='#f0c090'; ctx.fillRect(px+23,py+14,3,9);
  // Sword
  ctx.fillStyle='#aaaaee'; ctx.fillRect(px+25,py+5,3,16);
  ctx.fillStyle='#8b3010'; ctx.fillRect(px+22,py+10,8,2);
  ctx.fillStyle='#dde0ff'; ctx.fillRect(px+25,py+3,3,4);
  ctx.fillStyle='#ffd700'; ctx.fillRect(px+25,py+2,3,2);
  // Head
  ctx.fillStyle='#f0c090'; ctx.fillRect(px+9,py+5+bob,14,11);
  // Hair
  ctx.fillStyle='#6b3810'; ctx.fillRect(px+9,py+3+bob,14,4);
  ctx.fillRect(px+7,py+5+bob,3,6); ctx.fillRect(px+22,py+5+bob,3,6);
  // Eyes
  ctx.fillStyle='#1a0a00'; ctx.fillRect(px+11,py+9+bob,3,2); ctx.fillRect(px+18,py+9+bob,3,2);
  ctx.fillStyle='#fff'; ctx.fillRect(px+11,py+9+bob,1,1); ctx.fillRect(px+18,py+9+bob,1,1);
  // Visor/headband
  ctx.fillStyle='#c0922a'; ctx.fillRect(px+9,py+5+bob,14,2);
  ctx.restore();
}

function drawEnemy(en,px,py){
  switch(en.id){
    case 'slime':    drawSlime(px,py,en.col); break;
    case 'bat':      drawBat(px,py,en.col); break;
    case 'skeleton': drawSkeleton(px,py,en.col); break;
    case 'goblin':   drawGoblin(px,py,en.col); break;
    case 'demon':    drawDemon(px,py,en.col); break;
    case 'dragon':   drawDragon(px,py,en.col); break;
  }
}

function drawSlime(px,py,col){
  ctx.fillStyle=col;
  ctx.fillRect(px+7,py+16,18,11); ctx.fillRect(px+5,py+18,22,8);
  ctx.fillRect(px+9,py+13,14,5); ctx.fillRect(px+11,py+11,10,3);
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(px+10,py+13,6,3);
  ctx.fillStyle='#111';
  ctx.fillRect(px+10,py+17,4,4); ctx.fillRect(px+18,py+17,4,4);
  ctx.fillStyle='#fff';
  ctx.fillRect(px+11,py+18,2,2); ctx.fillRect(px+19,py+18,2,2);
  // drool
  ctx.fillStyle='rgba(80,250,123,0.5)';
  ctx.fillRect(px+14,py+26,3,3);
}

function drawBat(px,py,col){
  ctx.fillStyle='#3a3060';
  ctx.fillRect(px+1,py+10,10,9); ctx.fillRect(px+21,py+10,10,9);
  ctx.fillRect(px+1,py+7,7,5);   ctx.fillRect(px+24,py+7,7,5);
  ctx.fillStyle=col;
  ctx.fillRect(px+2,py+11,8,7);  ctx.fillRect(px+22,py+11,8,7);
  ctx.fillRect(px+2,py+8,5,4);   ctx.fillRect(px+25,py+8,5,4);
  // Body
  ctx.fillStyle='#4a3870';
  ctx.fillRect(px+10,py+9,12,15);
  // Ears
  ctx.fillStyle=col;
  ctx.fillRect(px+11,py+5,4,6); ctx.fillRect(px+17,py+5,4,6);
  // Eyes
  ctx.fillStyle='#ff0000';
  ctx.fillRect(px+11,py+12,4,3); ctx.fillRect(px+17,py+12,4,3);
  ctx.fillStyle='#ff8080'; ctx.fillRect(px+12,py+12,2,2); ctx.fillRect(px+18,py+12,2,2);
  // Fangs
  ctx.fillStyle='#eee';
  ctx.fillRect(px+13,py+22,2,5); ctx.fillRect(px+17,py+22,2,5);
}

function drawSkeleton(px,py,col){
  ctx.fillStyle=col;
  // Skull
  ctx.fillRect(px+8,py+3,16,13);
  ctx.fillRect(px+6,py+6,3,7); ctx.fillRect(px+23,py+6,3,7);
  // Eye sockets
  ctx.fillStyle='#0a0812';
  ctx.fillRect(px+10,py+6,5,5); ctx.fillRect(px+17,py+6,5,5);
  ctx.fillRect(px+14,py+11,5,2);
  // Jaw
  ctx.fillStyle=col;
  ctx.fillRect(px+9,py+14,14,5);
  // Teeth gaps
  ctx.fillStyle='#0a0812';
  ctx.fillRect(px+10,py+16,2,3); ctx.fillRect(px+13,py+16,2,3);
  ctx.fillRect(px+16,py+16,2,3); ctx.fillRect(px+19,py+16,2,3);
  // Ribcage
  ctx.fillStyle=col;
  ctx.fillRect(px+10,py+19,12,10);
  ctx.fillStyle='#0a0812';
  ctx.fillRect(px+11,py+21,10,2); ctx.fillRect(px+11,py+24,10,2); ctx.fillRect(px+11,py+27,10,2);
  ctx.fillRect(px+15,py+19,2,10);
  // Arms
  ctx.fillStyle=col;
  ctx.fillRect(px+4,py+19,7,2); ctx.fillRect(px+21,py+19,7,2);
  ctx.fillRect(px+3,py+19,3,8); ctx.fillRect(px+26,py+19,3,8);
  // Legs
  ctx.fillRect(px+10,py+29,4,3); ctx.fillRect(px+18,py+29,4,3);
}

function drawGoblin(px,py,col){
  // Big ears
  ctx.fillStyle=col;
  ctx.fillRect(px+4,py+9,6,5); ctx.fillRect(px+22,py+9,6,5);
  ctx.fillRect(px+3,py+10,3,3); ctx.fillRect(px+26,py+10,3,3);
  // Head
  ctx.fillRect(px+8,py+5,16,14);
  // Body
  ctx.fillStyle='#5c3a10'; ctx.fillRect(px+10,py+17,12,11);
  // Eyes
  ctx.fillStyle='#ffff00';
  ctx.fillRect(px+10,py+9,5,4); ctx.fillRect(px+17,py+9,5,4);
  ctx.fillStyle='#333'; ctx.fillRect(px+12,py+10,2,2); ctx.fillRect(px+19,py+10,2,2);
  // Nose
  ctx.fillStyle='#336633'; ctx.fillRect(px+14,py+13,4,3);
  ctx.fillStyle='#0a0'; ctx.fillRect(px+14,py+14,2,1); ctx.fillRect(px+16,py+14,2,1);
  // Dagger
  ctx.fillStyle='#aaa'; ctx.fillRect(px+23,py+13,2,12);
  ctx.fillStyle='#5c3a10'; ctx.fillRect(px+21,py+17,6,2);
  ctx.fillStyle='#ddd'; ctx.fillRect(px+23,py+11,2,3);
  // Belt
  ctx.fillStyle='#3a2010'; ctx.fillRect(px+10,py+20,12,2);
  ctx.fillStyle='#ffd700'; ctx.fillRect(px+14,py+20,4,2);
  // Legs
  ctx.fillStyle=col; ctx.fillRect(px+10,py+28,5,4); ctx.fillRect(px+17,py+28,5,4);
}

function drawDemon(px,py,col){
  // Wings
  ctx.fillStyle='#7a1010';
  ctx.fillRect(px+0,py+6,9,14); ctx.fillRect(px+23,py+6,9,14);
  ctx.fillRect(px+0,py+4,7,6); ctx.fillRect(px+25,py+4,7,6);
  ctx.fillStyle='#550a0a';
  ctx.fillRect(px+1,py+7,7,11); ctx.fillRect(px+24,py+7,7,11);
  // Horns
  ctx.fillStyle=col;
  ctx.fillRect(px+9,py+1,4,7); ctx.fillRect(px+19,py+1,4,7);
  ctx.fillRect(px+7,py+3,4,5); ctx.fillRect(px+21,py+3,4,5);
  // Head
  ctx.fillRect(px+7,py+6,18,14);
  // Body
  ctx.fillRect(px+8,py+18,16,12);
  // Eyes
  ctx.fillStyle='#ffee00';
  ctx.fillRect(px+10,py+9,5,5); ctx.fillRect(px+17,py+9,5,5);
  ctx.fillStyle='#ff4400';
  ctx.fillRect(px+11,py+10,3,3); ctx.fillRect(px+18,py+10,3,3);

  ctx.fillStyle='#ff2200'; ctx.fillRect(px+10,py+16,12,3);
  ctx.fillStyle='#fff';
  ctx.fillRect(px+11,py+17,2,3); ctx.fillRect(px+14,py+17,2,3);
  ctx.fillRect(px+17,py+17,2,3); ctx.fillRect(px+20,py+17,2,3);

  ctx.fillRect(px+22,py+26,3,4); ctx.fillRect(px+25,py+23,3,5);
  ctx.fillRect(px+27,py+20,4,5);
  // Claws
  ctx.fillStyle='#cc2200';
  ctx.fillRect(px+8,py+29,3,3); ctx.fillRect(px+21,py+29,3,3);
  ctx.fillRect(px+12,py+30,3,2); ctx.fillRect(px+17,py+30,3,2);

function drawDragon(px,py,col){
  // Wings
  ctx.fillStyle='#8b2200';
  ctx.fillRect(px+0,py+3,11,18); ctx.fillRect(px+21,py+3,11,18);
  ctx.fillRect(px+0,py+1,9,6); ctx.fillRect(px+23,py+1,9,6);
  ctx.fillStyle='#6b1800';
  ctx.fillRect(px+1,py+4,9,14); ctx.fillRect(px+22,py+4,9,14);
  // Body
  ctx.fillStyle=col;
  ctx.fillRect(px+9,py+9,14,18);
  // Neck
  ctx.fillRect(px+11,py+4,10,8);
  // Head
  ctx.fillRect(px+8,py+0,16,10);
  // Snout
  ctx.fillRect(px+22,py+2,7,6);
  ctx.fillStyle='#dd5500'; ctx.fillRect(px+27,py+3,3,4);
  ctx.fillStyle='#ff0000'; ctx.fillRect(px+23,py+4,2,2); ctx.fillRect(px+25,py+4,2,2);
  // Eye
  ctx.fillStyle='#ffff00';
  ctx.fillRect(px+10,py+2,6,6);
  ctx.fillStyle='#cc0000'; ctx.fillRect(px+11,py+3,4,4);
  ctx.fillStyle='#ff4400'; ctx.fillRect(px+12,py+4,2,2);
  // Teeth
  ctx.fillStyle='#fff';
  ctx.fillRect(px+22,py+6,2,4); ctx.fillRect(px+25,py+6,2,4);
  // Claws
  ctx.fillStyle='#cc7700';
  ctx.fillRect(px+9,py+26,4,5); ctx.fillRect(px+19,py+26,4,5);
  ctx.fillRect(px+12,py+28,4,4); ctx.fillRect(px+16,py+28,4,4);
  // Tail
  ctx.fillStyle=col;
  ctx.fillRect(px+4,py+24,7,4); ctx.fillRect(px+2,py+26,5,4);
  ctx.fillStyle='#8b2200'; ctx.fillRect(px+0,py+28,4,4); ctx.fillRect(px+2,py+30,5,4);
  // Scales
  ctx.fillStyle='rgba(0,0,0,0.2)';
  for(let i=0;i<3;i++) ctx.fillRect(px+11+i*4,py+12,3,2);
  for(let i=0;i<2;i++) ctx.fillRect(px+13+i*4,py+17,3,2);
}

// ── SIDEBAR ──
function drawSidebar(){
  const sx=MAP_W*TILE;
  ctx.fillStyle='#0b0a10'; ctx.fillRect(sx,0,SB_W,CH);
  ctx.fillStyle='#1a1830'; ctx.fillRect(sx,0,2,CH);

  // Title bar
  ctx.fillStyle='#13111e'; ctx.fillRect(sx,0,SB_W,24);
  ctx.fillStyle='#ffd700'; ctx.font='8px "Press Start 2P"'; ctx.textAlign='center';
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
  ctx.fillText('☠ DUNGEON QUEST', sx+SB_W/2, 15);
  ctx.shadowBlur=0;
  ctx.fillStyle='#1a1830'; ctx.fillRect(sx,24,SB_W,1);

  let cy=38;
  // Stats
  const stats=[
    ['FLOOR', `${floor} / 5`, '#8be9fd'],
    ['HP',    `${player.hp}/${player.maxHp}`, player.hp>player.maxHp*0.5?'#50fa7b':player.hp>player.maxHp*0.25?'#ffd700':'#ff5555'],
    ['LVL',  player.lv, '#f1fa8c'],
    ['EXP',  `${player.exp}/${player.xpN}`, '#bd93f9'],
    ['ATK',  player.atk, '#ff5555'],
    ['DEF',  player.def, '#8be9fd'],
    ['GOLD', player.gold, '#ffd700'],
  ];
  for(const [lbl,val,col] of stats){
    ctx.fillStyle='#444'; ctx.font='7px "Press Start 2P"'; ctx.textAlign='left';
    ctx.fillText(lbl, sx+10, cy);
    ctx.fillStyle=col; ctx.textAlign='right';
    ctx.fillText(val, sx+SB_W-10, cy);
    cy+=14;
  }

  // HP bar
  const bx=sx+10, bw=SB_W-20;
  ctx.fillStyle='#1a1830'; ctx.fillRect(bx,cy,bw,5);
  const hpC=player.hp>player.maxHp*0.5?'#50fa7b':player.hp>player.maxHp*0.25?'#ffd700':'#ff5555';
  ctx.fillStyle=hpC; ctx.fillRect(bx,cy,Math.round(bw*player.hp/player.maxHp),5);
  cy+=8;
  // XP bar
  ctx.fillStyle='#1a1830'; ctx.fillRect(bx,cy,bw,3);
  ctx.fillStyle='#bd93f9'; ctx.fillRect(bx,cy,Math.round(bw*player.exp/player.xpN),3);
  cy+=10;

  ctx.fillStyle='#1a1830'; ctx.fillRect(sx+6,cy,SB_W-12,1); cy+=10;

  // Nearby enemies
  ctx.fillStyle='#555'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText('— NEARBY ENEMIES —', sx+SB_W/2, cy); cy+=12;
  const nearby=enemies.filter(e=>Math.abs(e.x-player.x)+Math.abs(e.y-player.y)<10).slice(0,4);
  if(!nearby.length){ ctx.fillStyle='#333'; ctx.fillText('none', sx+SB_W/2, cy); cy+=14; }
  else {
    for(const en of nearby){
      const hp=en.hp/en.maxHp;
      ctx.fillStyle=en.col; ctx.font='6px "Press Start 2P"'; ctx.textAlign='left';
      ctx.fillText(en.n, sx+10, cy);
      ctx.fillStyle='#1a1830'; ctx.fillRect(sx+10,cy+2,bw,4);
      ctx.fillStyle=hp>0.5?'#50fa7b':hp>0.25?'#ffd700':'#ff5555';
      ctx.fillRect(sx+10,cy+2,Math.round(bw*hp),4);
      cy+=16;
    }
  }

  ctx.fillStyle='#1a1830'; ctx.fillRect(sx+6,cy,SB_W-12,1); cy+=10;

  // Message log
  ctx.fillStyle='#555'; ctx.font='6px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText('— LOG —', sx+SB_W/2, cy); cy+=10;
  const logSlice=msgs.slice(-8);
  ctx.font='6px "Press Start 2P"'; ctx.textAlign='left';
  for(const m of logSlice){
    ctx.fillStyle=m.t==='dmg'?'#ff8080':m.t==='pick'?'#80ff80':'#8888bb';
    const words=m.msg.split(' ');
    let line='';
    for(const w of words){
      const test=line?line+' '+w:w;
      if(ctx.measureText(test).width>bw&&line){ ctx.fillText(line,sx+10,cy); cy+=9; line=w; }
      else line=test;
    }
    if(line){ ctx.fillText(line,sx+10,cy); cy+=9; }
    if(cy>CH-30) break;
  }

  // Controls footer
  ctx.fillStyle='#252235'; ctx.fillRect(sx,CH-26,SB_W,26);
  ctx.fillStyle='#333'; ctx.font='5px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText('WASD/ARROWS: move & attack', sx+SB_W/2, CH-16);
  ctx.fillText(`SPACE: wait   BEST: ${hi}G`, sx+SB_W/2, CH-6);
  ctx.textAlign='left';
}

// ── OVERLAY (dead / win) ──
function drawOverlay(){
  const mw=MAP_W*TILE;
  ctx.fillStyle='rgba(5,4,12,0.82)'; ctx.fillRect(0,0,mw,CH);

  const isWin=gs===GSTATE.WIN;
  const col=isWin?'#ffd700':'#ff5555';
  const title=isWin?'YOU WIN!':'GAME OVER';

  ctx.shadowColor=col; ctx.shadowBlur=24;
  ctx.fillStyle=col; ctx.font='28px "Press Start 2P"'; ctx.textAlign='center';
  ctx.fillText(title, mw/2, CH/2-55);
  ctx.shadowBlur=0;

  ctx.fillStyle='#ccc'; ctx.font='9px "Press Start 2P"';
  ctx.fillText(`Floor ${floor}  ·  Gold ${player.gold}  ·  Level ${player.lv}`, mw/2, CH/2-12);
  ctx.fillText(`Kills: ${turn}  ·  ATK ${player.atk}  ·  DEF ${player.def}`, mw/2, CH/2+12);

  if(isWin&&player.gold>=hi&&hi>0){
    ctx.fillStyle='#ffd700'; ctx.font='8px "Press Start 2P"';
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=10;
    ctx.fillText('★ NEW HIGH SCORE! ★', mw/2, CH/2+36);
    ctx.shadowBlur=0;
  }

  if(Math.sin(blink*4)>0){
    ctx.fillStyle='#8be9fd'; ctx.font='9px "Press Start 2P"';
    ctx.fillText('PRESS ENTER TO CONTINUE', mw/2, CH/2+70);
  }
  ctx.textAlign='left';
}

// ── UTILS ──
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function inB(x,y){ return x>=0&&x<MAP_W&&y>=0&&y<MAP_H; }
function entityAt(x,y){ return enemyAt(x,y)||(player&&player.x===x&&player.y===y?player:null); }
function enemyAt(x,y){ return enemies.find(e=>e.x===x&&e.y===y)||null; }
function itemAt(x,y){ return items.find(i=>i.x===x&&i.y===y)||null; }
function log(msg,t='sys'){ msgs.push({msg,t}); if(msgs.length>60) msgs.shift(); }

// ── BOOT ──
initGlobal();
requestAnimationFrame(loop);
</script>
